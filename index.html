<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC AI LIVE TRADING DASHBOARD PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { background: #020617; font-family: 'Segoe UI', system-ui, sans-serif; }
        .symbol-btn.active { background: #059669 !important; box-shadow: 0 0 15px rgba(16,185,129,0.4); }
        .card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid #334155; }
        .glow { box-shadow: 0 0 25px rgba(16,185,129,0.1); }
    </style>
</head>
<body class="text-white min-h-screen">
    <div class="max-w-7xl mx-auto p-4">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-black text-emerald-400 tracking-tight">
                    <i class="fas fa-robot mr-2"></i>SMC AI QUANT TRADING DASHBOARD
                </h1>
                <p class="text-gray-400 text-sm">Real-time Advanced Market Structure & Smart Money Concepts</p>
            </div>
            <div class="flex items-center gap-3 bg-slate-800 px-4 py-2 rounded-2xl border border-slate-700">
                <span id="priceDisplay" class="text-2xl font-mono text-emerald-400 font-bold">--</span>
                <span id="status" class="text-xs bg-yellow-500/20 text-yellow-400 px-2 py-1 rounded-md font-semibold">Connecting...</span>
            </div>
        </div>

        <div class="card rounded-2xl p-4 mb-6 glow">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Finnhub API Key</label>
                    <input id="apiKey" type="password" placeholder="Masukkan API Key" class="bg-slate-900/50 p-2.5 rounded-xl w-full text-white text-sm border border-slate-700 focus:border-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Telegram Bot Token</label>
                    <input id="botToken" type="password" placeholder="Bot Token" class="bg-slate-900/50 p-2.5 rounded-xl w-full text-white text-sm border border-slate-700 focus:border-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Telegram Chat ID</label>
                    <input id="chatId" type="text" placeholder="Chat ID" class="bg-slate-900/50 p-2.5 rounded-xl w-full text-white text-sm border border-slate-700 focus:border-emerald-500 outline-none">
                </div>
            </div>
            <div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-700/50">
                <div class="flex items-center gap-2 text-sm text-gray-300">
                    <input id="enableTelegram" type="checkbox" checked class="w-4 h-4 accent-emerald-500">
                    <label for="enableTelegram">Kirim alert via Telegram</label>
                </div>
                <div class="flex gap-2">
                    <button onclick="saveSettings()" class="bg-blue-600 hover:bg-blue-500 px-6 py-1.5 rounded-xl text-xs font-semibold transition">Save Settings</button>
                </div>
            </div>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="changeSymbol('EURUSD',this)" class="symbol-btn active px-5 py-2.5 bg-slate-800 rounded-xl text-sm font-bold">EUR/USD</button>
            <button onclick="changeSymbol('GBPUSD',this)" class="symbol-btn px-5 py-2.5 bg-slate-800 rounded-xl text-sm font-bold">GBP/USD</button>
            <button onclick="changeSymbol('USDJPY',this)" class="symbol-btn px-5 py-2.5 bg-slate-800 rounded-xl text-sm font-bold">USD/JPY</button>
            <button onclick="changeSymbol('XAUUSD',this)" class="symbol-btn px-5 py-2.5 bg-slate-800 rounded-xl text-sm font-bold">XAU/USD</button>
            <button onclick="changeSymbol('BTCUSD',this)" class="symbol-btn px-5 py-2.5 bg-slate-800 rounded-xl text-sm font-bold">BTC/USD</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 card rounded-3xl p-4 glow flex flex-col justify-between">
                <div class="flex justify-between items-center mb-3">
                    <h3 id="chartTitle" class="font-bold text-lg text-slate-300">Live Candlestick Feed (H1 Base Generated)</h3>
                    <span class="text-xs bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-full border border-emerald-500/20">Real-Time Tick Engine</span>
                </div>
                <div id="chart" class="w-full h-[430px] rounded-2xl overflow-hidden bg-slate-950"></div>
            </div>

            <div class="card rounded-3xl p-5 glow">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-hourglass-half text-emerald-400"></i> Multi-Timeframe Forecasts
                </h2>
                
                <div class="space-y-2.5 max-h-[440px] overflow-y-auto pr-1">
                    <div class="flex justify-between items-center bg-slate-900/40 p-3 rounded-xl border border-slate-800">
                        <div><span class="font-bold text-sm block">1 Menit (M1)</span><span class="text-xs text-gray-400" id="analysis-1m">Calculating...</span></div>
                        <span id="tf-1m" class="px-3 py-1 rounded-lg text-xs font-black bg-slate-800 text-gray-400">WAIT</span>
                    </div>
                    <div class="flex justify-between items-center bg-slate-900/40 p-3 rounded-xl border border-slate-800">
                        <div><span class="font-bold text-sm block">5 Menit (M5)</span><span class="text-xs text-gray-400" id="analysis-5m">Calculating...</span></div>
                        <span id="tf-5m" class="px-3 py-1 rounded-lg text-xs font-black bg-slate-800 text-
